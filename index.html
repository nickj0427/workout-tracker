<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IRON LOG — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --muted: #666;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–body);
min-height: 100vh;
overflow-x: hidden;
}

/* HEADER */
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 28px;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
background: var(–bg);
z-index: 100;
}

.logo {
font-family: var(–display);
font-size: 2rem;
letter-spacing: 3px;
color: var(–accent);
}

.logo span { color: var(–text); }

nav { display: flex; gap: 4px; }

nav button {
background: none;
border: 1px solid transparent;
color: var(–muted);
font-family: var(–mono);
font-size: 0.72rem;
letter-spacing: 1.5px;
text-transform: uppercase;
padding: 8px 16px;
cursor: pointer;
transition: all 0.2s;
border-radius: 4px;
}

nav button.active, nav button:hover {
color: var(–accent);
border-color: var(–accent);
}

/* VIEWS */
.view { display: none; padding: 28px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.view.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* SECTION TITLES */
.section-title {
font-family: var(–display);
font-size: 2.5rem;
letter-spacing: 2px;
margin-bottom: 8px;
}

.section-subtitle {
font-family: var(–mono);
font-size: 0.72rem;
color: var(–muted);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 28px;
}

/* LOG VIEW */
.date-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 24px;
}

.date-row input[type=“date”] {
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 0.85rem;
padding: 10px 14px;
border-radius: 6px;
cursor: pointer;
}

.muscle-group-select {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-bottom: 24px;
}

.muscle-btn {
background: var(–card);
border: 1px solid var(–border);
color: var(–muted);
font-family: var(–mono);
font-size: 0.72rem;
letter-spacing: 1.5px;
text-transform: uppercase;
padding: 8px 16px;
cursor: pointer;
transition: all 0.2s;
border-radius: 4px;
}

.muscle-btn.active {
background: var(–accent);
border-color: var(–accent);
color: #000;
font-weight: 500;
}

/* EXERCISE BLOCK */
.exercise-block {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
margin-bottom: 16px;
overflow: hidden;
transition: border-color 0.2s;
}

.exercise-block:hover { border-color: #3a3a3a; }

.exercise-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 18px;
border-bottom: 1px solid var(–border);
background: #1e1e1e;
}

.exercise-name-input {
background: none;
border: none;
color: var(–text);
font-family: var(–display);
font-size: 1.4rem;
letter-spacing: 1px;
flex: 1;
outline: none;
}

.exercise-name-input::placeholder { color: var(–muted); }

.remove-exercise-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 1.2rem;
line-height: 1;
padding: 4px 8px;
transition: color 0.2s;
}

.remove-exercise-btn:hover { color: var(–accent2); }

.sets-container { padding: 12px 18px; }

.set-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 8px;
animation: slideIn 0.2s ease;
}

@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

.set-label {
font-family: var(–mono);
font-size: 0.72rem;
color: var(–muted);
letter-spacing: 1px;
width: 40px;
flex-shrink: 0;
}

.set-input {
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 0.9rem;
padding: 8px 12px;
border-radius: 6px;
width: 90px;
text-align: center;
transition: border-color 0.2s;
outline: none;
}

.set-input:focus { border-color: var(–accent); }

.set-separator {
color: var(–muted);
font-family: var(–mono);
font-size: 0.8rem;
}

.remove-set-btn {
background: none;
border: none;
color: var(–border);
cursor: pointer;
font-size: 1rem;
transition: color 0.2s;
margin-left: auto;
padding: 4px;
}

.remove-set-btn:hover { color: var(–accent2); }

.set-actions { display: flex; gap: 8px; margin-top: 8px; }

/* BUTTONS */
.btn {
font-family: var(–mono);
font-size: 0.72rem;
letter-spacing: 1.5px;
text-transform: uppercase;
padding: 10px 18px;
border-radius: 6px;
cursor: pointer;
transition: all 0.2s;
border: 1px solid transparent;
}

.btn-ghost {
background: none;
border-color: var(–border);
color: var(–muted);
}

.btn-ghost:hover { border-color: var(–accent); color: var(–accent); }

.btn-accent {
background: var(–accent);
color: #000;
font-weight: 500;
border-color: var(–accent);
}

.btn-accent:hover { background: #d4eb2e; }

.btn-danger {
background: none;
border-color: var(–accent2);
color: var(–accent2);
}

.btn-danger:hover { background: var(–accent2); color: #fff; }

.add-exercise-row {
display: flex;
gap: 10px;
margin-top: 20px;
align-items: center;
flex-wrap: wrap;
}

.quick-add-input {
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 0.85rem;
padding: 10px 14px;
border-radius: 6px;
flex: 1;
min-width: 180px;
outline: none;
transition: border-color 0.2s;
}

.quick-add-input:focus { border-color: var(–accent); }

/* SAVE ROW */
.save-row {
display: flex;
justify-content: flex-end;
gap: 10px;
margin-top: 28px;
padding-top: 20px;
border-top: 1px solid var(–border);
}

/* HISTORY VIEW */
.history-filters {
display: flex;
gap: 8px;
margin-bottom: 24px;
flex-wrap: wrap;
align-items: center;
}

.history-filters select {
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 0.78rem;
padding: 8px 14px;
border-radius: 6px;
cursor: pointer;
outline: none;
}

.workout-entry {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
margin-bottom: 12px;
overflow: hidden;
}

.workout-entry-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 18px;
cursor: pointer;
transition: background 0.2s;
}

.workout-entry-header:hover { background: #1e1e1e; }

.workout-date {
font-family: var(–display);
font-size: 1.2rem;
letter-spacing: 1px;
}

.workout-tags { display: flex; gap: 6px; }

.tag {
background: #1e1e1e;
border: 1px solid var(–border);
color: var(–muted);
font-family: var(–mono);
font-size: 0.65rem;
letter-spacing: 1px;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 3px;
}

.tag.accent { border-color: var(–accent); color: var(–accent); }

.workout-entry-body {
display: none;
padding: 14px 18px;
border-top: 1px solid var(–border);
}

.workout-entry-body.open { display: block; }

.history-exercise {
margin-bottom: 14px;
}

.history-exercise-name {
font-family: var(–display);
font-size: 1.1rem;
letter-spacing: 1px;
margin-bottom: 6px;
}

.history-sets {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.history-set-chip {
background: var(–surface);
border: 1px solid var(–border);
font-family: var(–mono);
font-size: 0.75rem;
padding: 4px 10px;
border-radius: 20px;
color: var(–text);
}

.delete-workout-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 0.8rem;
padding: 4px 8px;
font-family: var(–mono);
transition: color 0.2s;
}

.delete-workout-btn:hover { color: var(–accent2); }

/* PROGRESS VIEW */
.progress-controls {
display: flex;
gap: 10px;
margin-bottom: 28px;
flex-wrap: wrap;
}

.progress-controls select {
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 0.78rem;
padding: 10px 14px;
border-radius: 6px;
cursor: pointer;
outline: none;
flex: 1;
min-width: 180px;
}

.chart-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 24px;
margin-bottom: 20px;
}

.chart-title {
font-family: var(–display);
font-size: 1.3rem;
letter-spacing: 1px;
margin-bottom: 4px;
}

.chart-subtitle {
font-family: var(–mono);
font-size: 0.68rem;
color: var(–muted);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 18px;
}

canvas { width: 100% !important; }

.stats-row {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap: 12px;
margin-bottom: 24px;
}

.stat-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 16px;
text-align: center;
}

.stat-value {
font-family: var(–display);
font-size: 2rem;
letter-spacing: 1px;
color: var(–accent);
}

.stat-label {
font-family: var(–mono);
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-top: 4px;
}

/* EMPTY STATE */
.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–muted);
}

.empty-icon { font-size: 3rem; margin-bottom: 12px; }

.empty-state p {
font-family: var(–mono);
font-size: 0.8rem;
letter-spacing: 1px;
}

/* TOAST */
.toast {
position: fixed;
bottom: 28px;
right: 28px;
background: var(–accent);
color: #000;
font-family: var(–mono);
font-size: 0.78rem;
letter-spacing: 1px;
padding: 12px 20px;
border-radius: 8px;
transform: translateY(80px);
opacity: 0;
transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 999;
font-weight: 500;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* RESPONSIVE */
@media (max-width: 600px) {
header { padding: 14px 16px; }
.view { padding: 16px; }
.logo { font-size: 1.5rem; }
nav button { font-size: 0.65rem; padding: 7px 10px; }
}
</style>

</head>
<body>

<header>
  <div class="logo">IRON<span>LOG</span></div>
  <nav>
    <button class="active" onclick="showView('log', this)">Log</button>
    <button onclick="showView('history', this)">History</button>
    <button onclick="showView('progress', this)">Progress</button>
  </nav>
</header>

<!-- LOG VIEW -->

<div id="view-log" class="view active">
  <div class="section-title">NEW SESSION</div>
  <div class="section-subtitle">Log your workout</div>

  <div class="date-row">
    <input type="date" id="session-date" />
    <span style="font-family: var(--mono); font-size: 0.75rem; color: var(--muted);">SESSION DATE</span>
  </div>

  <div class="section-subtitle" style="margin-bottom: 12px;">Muscle Group</div>
  <div class="muscle-group-select" id="muscle-group-select">
    <button class="muscle-btn active" onclick="selectMuscle(this, 'Chest')">Chest</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Back')">Back</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Legs')">Legs</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Shoulders')">Shoulders</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Arms')">Arms</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Core')">Core</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Full Body')">Full Body</button>
    <button class="muscle-btn" onclick="selectMuscle(this, 'Cardio')">Cardio</button>
  </div>

  <div id="exercises-container"></div>

  <div class="add-exercise-row">
    <input type="text" class="quick-add-input" id="new-exercise-name" placeholder="Exercise name (e.g. Bench Press)" onkeydown="if(event.key==='Enter')addExercise()" />
    <button class="btn btn-ghost" onclick="addExercise()">+ Add Exercise</button>
  </div>

  <div class="save-row">
    <button class="btn btn-ghost" onclick="clearSession()">Clear</button>
    <button class="btn btn-accent" onclick="saveSession()">Save Session</button>
  </div>
</div>

<!-- HISTORY VIEW -->

<div id="view-history" class="view">
  <div class="section-title">HISTORY</div>
  <div class="section-subtitle">Past sessions</div>
  <div class="history-filters">
    <select id="history-filter" onchange="renderHistory()">
      <option value="all">All Muscle Groups</option>
      <option value="Chest">Chest</option>
      <option value="Back">Back</option>
      <option value="Legs">Legs</option>
      <option value="Shoulders">Shoulders</option>
      <option value="Arms">Arms</option>
      <option value="Core">Core</option>
      <option value="Full Body">Full Body</option>
      <option value="Cardio">Cardio</option>
    </select>
  </div>
  <div id="history-container"></div>
</div>

<!-- PROGRESS VIEW -->

<div id="view-progress" class="view">
  <div class="section-title">PROGRESS</div>
  <div class="section-subtitle">Weight & rep progression</div>

  <div class="progress-controls">
    <select id="progress-exercise" onchange="renderProgress()">
      <option value="">— Select Exercise —</option>
    </select>
    <select id="progress-metric" onchange="renderProgress()">
      <option value="maxWeight">Max Weight per Session</option>
      <option value="totalVolume">Total Volume (weight × reps)</option>
      <option value="maxReps">Max Reps per Session</option>
    </select>
  </div>

  <div id="stats-container" class="stats-row"></div>
  <div id="progress-chart-container"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('ironlog_sessions') || '[]');
let currentMuscleGroup = 'Chest';
let exerciseBlocks = [];
let chartInstances = {};

// ─── INIT ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('session-date').value = today();
  addExerciseBlock('Bench Press');
  renderProgress();
  populateExerciseSelect();
});

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ─── VIEWS ───────────────────────────────────────────────
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'progress') { populateExerciseSelect(); renderProgress(); }
}

// ─── MUSCLE GROUP ─────────────────────────────────────────
function selectMuscle(btn, group) {
  document.querySelectorAll('.muscle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMuscleGroup = group;
}

// ─── EXERCISES ───────────────────────────────────────────
function addExercise() {
  const input = document.getElementById('new-exercise-name');
  const name = input.value.trim();
  addExerciseBlock(name || 'Exercise');
  input.value = '';
}

function addExerciseBlock(name = '') {
  const id = Date.now() + Math.random();
  exerciseBlocks.push({ id, name, sets: [] });
  const container = document.getElementById('exercises-container');
  const block = document.createElement('div');
  block.className = 'exercise-block';
  block.id = 'block-' + id;
  block.innerHTML = `
    <div class="exercise-header">
      <input class="exercise-name-input" type="text" value="${name}" placeholder="Exercise Name"
        oninput="updateExerciseName(${id}, this.value)" />
      <button class="remove-exercise-btn" onclick="removeExerciseBlock(${id})">✕</button>
    </div>
    <div class="sets-container" id="sets-${id}"></div>
    <div style="padding: 0 18px 14px;">
      <div class="set-actions">
        <button class="btn btn-ghost" style="font-size:0.68rem;" onclick="addSet(${id})">+ Add Set</button>
      </div>
    </div>
  `;
  container.appendChild(block);
  addSet(id);
  addSet(id);
  addSet(id);
}

function removeExerciseBlock(id) {
  exerciseBlocks = exerciseBlocks.filter(e => e.id !== id);
  document.getElementById('block-' + id)?.remove();
}

function updateExerciseName(id, name) {
  const ex = exerciseBlocks.find(e => e.id === id);
  if (ex) ex.name = name;
}

function addSet(exerciseId) {
  const ex = exerciseBlocks.find(e => e.id === exerciseId);
  if (!ex) return;
  const setId = Date.now() + Math.random();
  ex.sets.push({ id: setId, weight: '', reps: '' });
  const container = document.getElementById('sets-' + exerciseId);
  const setNum = ex.sets.length;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.id = 'set-' + setId;
  row.innerHTML = `
    <span class="set-label">SET ${setNum}</span>
    <input class="set-input" type="number" placeholder="Weight" min="0" step="2.5"
      oninput="updateSet(${exerciseId}, ${setId}, 'weight', this.value)" />
    <span class="set-separator">×</span>
    <input class="set-input" type="number" placeholder="Reps" min="0"
      oninput="updateSet(${exerciseId}, ${setId}, 'reps', this.value)" />
    <button class="remove-set-btn" onclick="removeSet(${exerciseId}, ${setId})">✕</button>
  `;
  container.appendChild(row);
}

function removeSet(exerciseId, setId) {
  const ex = exerciseBlocks.find(e => e.id === exerciseId);
  if (!ex) return;
  ex.sets = ex.sets.filter(s => s.id !== setId);
  document.getElementById('set-' + setId)?.remove();
  // Renumber
  const container = document.getElementById('sets-' + exerciseId);
  container.querySelectorAll('.set-label').forEach((label, i) => {
    label.textContent = `SET ${i + 1}`;
  });
}

function updateSet(exerciseId, setId, field, value) {
  const ex = exerciseBlocks.find(e => e.id === exerciseId);
  if (!ex) return;
  const s = ex.sets.find(s => s.id === setId);
  if (s) s[field] = parseFloat(value) || '';
}

// ─── SAVE ────────────────────────────────────────────────
function saveSession() {
  const date = document.getElementById('session-date').value;
  const exercises = exerciseBlocks
    .filter(e => e.name.trim())
    .map(e => ({
      name: e.name.trim(),
      sets: e.sets.filter(s => s.weight !== '' || s.reps !== '').map(s => ({
        weight: s.weight || 0,
        reps: s.reps || 0
      }))
    }))
    .filter(e => e.sets.length > 0);

  if (!exercises.length) { showToast('Add at least one exercise with sets!'); return; }

  const session = { id: Date.now(), date, muscleGroup: currentMuscleGroup, exercises };
  sessions.unshift(session);
  localStorage.setItem('ironlog_sessions', JSON.stringify(sessions));
  showToast('Session saved!');
  populateExerciseSelect();
}

function clearSession() {
  document.getElementById('exercises-container').innerHTML = '';
  exerciseBlocks = [];
  document.getElementById('session-date').value = today();
  addExerciseBlock('');
}

// ─── HISTORY ─────────────────────────────────────────────
function renderHistory() {
  const filter = document.getElementById('history-filter').value;
  const filtered = filter === 'all' ? sessions : sessions.filter(s => s.muscleGroup === filter);
  const container = document.getElementById('history-container');

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No sessions yet. Start logging!</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(s => `
    <div class="workout-entry">
      <div class="workout-entry-header" onclick="toggleEntry(this)">
        <div>
          <div class="workout-date">${formatDate(s.date)}</div>
          <div style="margin-top:6px;" class="workout-tags">
            <span class="tag accent">${s.muscleGroup}</span>
            <span class="tag">${s.exercises.length} exercise${s.exercises.length !== 1 ? 's' : ''}</span>
            <span class="tag">${s.exercises.reduce((a,e)=>a+e.sets.length,0)} sets</span>
          </div>
        </div>
        <button class="delete-workout-btn" onclick="event.stopPropagation();deleteSession(${s.id})">Delete</button>
      </div>
      <div class="workout-entry-body">
        ${s.exercises.map(e => `
          <div class="history-exercise">
            <div class="history-exercise-name">${e.name}</div>
            <div class="history-sets">
              ${e.sets.map(set => `<span class="history-set-chip">${set.weight}×${set.reps}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleEntry(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('ironlog_sessions', JSON.stringify(sessions));
  renderHistory();
  populateExerciseSelect();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
}

// ─── PROGRESS ────────────────────────────────────────────
function populateExerciseSelect() {
  const allExercises = new Set();
  sessions.forEach(s => s.exercises.forEach(e => allExercises.add(e.name)));
  const sel = document.getElementById('progress-exercise');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Select Exercise —</option>' +
    [...allExercises].sort().map(n => `<option value="${n}" ${n === current ? 'selected' : ''}>${n}</option>`).join('');
}

function renderProgress() {
  const exerciseName = document.getElementById('progress-exercise').value;
  const metric = document.getElementById('progress-metric').value;
  const container = document.getElementById('progress-chart-container');
  const statsContainer = document.getElementById('stats-container');

  if (!exerciseName) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📈</div><p>Select an exercise to view progression</p></div>`;
    statsContainer.innerHTML = '';
    return;
  }

  // Gather data
  const dataPoints = [];
  sessions.slice().reverse().forEach(s => {
    const ex = s.exercises.find(e => e.name === exerciseName);
    if (!ex || !ex.sets.length) return;
    const weights = ex.sets.map(s => s.weight).filter(w => w > 0);
    const reps = ex.sets.map(s => s.reps).filter(r => r > 0);
    const volume = ex.sets.reduce((a, s) => a + (s.weight * s.reps), 0);
    dataPoints.push({
      date: s.date,
      maxWeight: weights.length ? Math.max(...weights) : 0,
      totalVolume: volume,
      maxReps: reps.length ? Math.max(...reps) : 0,
      sets: ex.sets
    });
  });

  if (!dataPoints.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No data for this exercise yet</p></div>`;
    statsContainer.innerHTML = '';
    return;
  }

  // Stats
  const values = dataPoints.map(d => d[metric]);
  const best = Math.max(...values);
  const latest = values[values.length - 1];
  const first = values[0];
  const improvement = first > 0 ? (((latest - first) / first) * 100).toFixed(1) : '—';
  const sessions_count = dataPoints.length;

  statsContainer.innerHTML = `
    <div class="stat-card"><div class="stat-value">${best}${metric === 'totalVolume' ? '' : metric === 'maxWeight' ? 'lb' : ''}</div><div class="stat-label">Personal Best</div></div>
    <div class="stat-card"><div class="stat-value">${latest}${metric === 'maxWeight' ? 'lb' : ''}</div><div class="stat-label">Latest</div></div>
    <div class="stat-card"><div class="stat-value">${improvement}%</div><div class="stat-label">Improvement</div></div>
    <div class="stat-card"><div class="stat-value">${sessions_count}</div><div class="stat-label">Sessions</div></div>
  `;

  // Chart
  const chartId = 'prog-chart';
  container.innerHTML = `
    <div class="chart-card">
      <div class="chart-title">${exerciseName}</div>
      <div class="chart-subtitle">${metricLabel(metric)} over time</div>
      <canvas id="${chartId}"></canvas>
    </div>
  `;

  if (chartInstances[chartId]) { chartInstances[chartId].destroy(); }

  const labels = dataPoints.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });

  const ctx = document.getElementById(chartId).getContext('2d');
  chartInstances[chartId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: metricLabel(metric),
        data: dataPoints.map(d => d[metric]),
        borderColor: '#e8ff47',
        backgroundColor: 'rgba(232,255,71,0.08)',
        pointBackgroundColor: '#e8ff47',
        pointBorderColor: '#000',
        pointRadius: 6,
        pointHoverRadius: 8,
        borderWidth: 2,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e1e',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#e8ff47',
          bodyColor: '#f0f0f0',
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont: { family: 'DM Mono', size: 12 }
        }
      },
      scales: {
        x: {
          ticks: { color: '#666', font: { family: 'DM Mono', size: 10 } },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#666', font: { family: 'DM Mono', size: 10 } },
          grid: { color: '#1e1e1e' },
          beginAtZero: false
        }
      }
    }
  });
}

function metricLabel(metric) {
  return { maxWeight: 'Max Weight (lbs)', totalVolume: 'Total Volume (lbs)', maxReps: 'Max Reps' }[metric];
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
